<!-- CONTACT INFO -->
<section style="max-width:800px; margin:auto; padding:20px;">

  <div style="background:#111; padding:15px; margin-bottom:10px; border-radius:10px;">

<section style="max-width:800px; margin:auto; padding:20px;">

    <textarea placeholder="Your Message"
      style="width:100%; padding:10px; height:120px; border:none; border-radius:5px;"></textarea><br><br>

    <button type="button"
      style="background:#D4AF37; padding:12px 25px; border:none; border-radius:25px; font-weight:bold;">
