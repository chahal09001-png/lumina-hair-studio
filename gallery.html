<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Lumina Hair Studio</title>

  <style>
    body {
      margin: 0;
      background: #0F0F0F;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR LINKS */
    a {
      transition: 0.3s ease;
      text-decoration: none;
    }

    a:hover {
      color: #D4AF37 !important;
    }

    /* GALLERY IMAGES */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .gallery-grid img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      transition: 0.4s ease;
    }

    .gallery-grid img:hover {
      transform: scale(1.05);
    }

    /* TITLE */
    h1 {
      color: #D4AF37;
      font-size: 42px;
    }

    p {
      color: #ccc;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 32px;
      }
    }
  </style>

</head>

<body>

<!-- NAVBAR -->
<header style="display:flex; justify-content:space-between; align-items:center; padding:20px; border-bottom:1px solid #333;">

  <div style="color:#D4AF37; font-weight:bold; font-size:18px;">
    Lumina Hair Studio
  </div>

  <nav>
    <a href="index.html" style="margin:0 10px; color:white;">Home</a>
    <a href="services.html" style="margin:0 10px; color:white;">Services</a>
    <a href="about.html" style="margin:0 10px; color:white;">About</a>
    <a href="gallery.html" style="margin:0 10px; color:#D4AF37;">Gallery</a>
    <a href="contact.html" style="margin:0 10px; color:white;">Contact</a>
  </nav>

</header>

<!-- TITLE -->
<section style="text-align:center; padding:60px 20px;">
  <h1>Our Gallery</h1>
  <p>Luxury transformations & premium hair styling results</p>
</section>

<!-- GALLERY GRID -->
<section class="gallery-grid">

  <img src="https://images.unsplash.com/photo-1522337660859-02fbefca4702">
  <img src="https://images.unsplash.com/photo-1516975080664-ed2fc6a32937">
  <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e">
  <img src="https://images.unsplash.com/photo-1605497788044-5a32c7078486">
  <img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f">
  <img src="https://images.unsplash.com/photo-1560869713-7d0c9f9c1b3a">

</section>

</body>
</html>
