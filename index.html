<!DOCTYPE html>
<html lang="en">

<head>

  <title>Lumina Hair Studio</title>

  <!-- MOBILE FIX -->
  <style>
    body {
      margin: 0;

      background-position: center;
      background-attachment: fixed;
    }

    /* dark overlay */
    .overlay {

      top: 0;
      left: 0;

      background: rgba(0,0,0,0.65);

    }

    a {
      transition: 0.3s ease;

    a:hover {

    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      nav a {
        display: inline-block;
        margin: 8px 5px;
        font-size: 14px;
      }

      h1 {
        font-size: 34px !important;
      }
    }
  </style>

</head>

<body>

<!-- DARK OVERLAY -->
<div class="overlay"></div>

<!-- NAVBAR -->
<header style="display:flex; justify-content:space-between; align-items:center; padding:20px; border-bottom:1px solid rgba(255,255,255,0.1);">

  <div style="color:#D4AF37; font-weight:bold; font-size:18px;">
    Lumina Hair Studio
  </div>

  <nav>
    <a href="index.html" style="margin:0 10px; color:#D4AF37; text-decoration:none;">Home</a>
    <a href="services.html" style="margin:0 10px; color:white; text-decoration:none;">Services</a>
    <a href="about.html" style="margin:0 10px; color:white; text-decoration:none;">About</a>

    Lumina Hair Studio
  </h1>
